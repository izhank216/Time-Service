<!DOCTYPE html>
<html>
<head>
  <title>Notepad - Time Service App</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      color: #fff;
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #222;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      backdrop-filter: blur(20px);
    }
    #notepad-content {
      background: #222d;
      padding: 2em;
      border-radius: 16px;
      width: 80%;
      max-width: 800px;
      box-shadow: 0 0 24px #000a;
      display: flex;
      flex-direction: column;
    }
    h1 {
      margin: 0 0 0.5em 0;
      text-decoration: underline;
      font-size: 1.6em;
      text-align: center;
    }
    .editor-wrapper {
      position: relative;
      background: #111;
      border-radius: 8px;
      border: 1px solid #444;
      margin-bottom: 1em;
    }
    .editor-input {
      min-height: 300px;
      padding: 15px;
      color: #eee;
      outline: none;
      font-size: 1.1em;
      overflow-y: auto;
    }
    #notepad-actions {
      display: flex;
      gap: 1em;
      justify-content: center;
    }
    #close-notepad-btn, #save-notepad-btn {
      padding: 0.6em 1.5em;
      font-size: 1em;
      border-radius: 6px;
      border: none;
      background: #00aaff;
      color: #fff;
      cursor: pointer;
      font-weight: bold;
      transition: background 0.2s;
    }
    #close-notepad-btn:hover, #save-notepad-btn:hover {
      background: #0088cc;
    }
  </style>
</head>
<body>

  <div id="notepad-content">
    <h1>Notepad</h1>
    <div class="editor-wrapper">
      <div id="lexical-editor" class="editor-input" contenteditable="true"></div>
    </div>
    <div id="notepad-actions">
      <button id="save-notepad-btn">Save</button>
      <button id="close-notepad-btn">Close</button>
    </div>
  </div>

  <script>
    const { dialog } = require('@electron/remote');
    const fs = require('fs');
    const { createEditor, $getRoot } = require('lexical');

    const editorElement = document.getElementById('lexical-editor');
    
    const editor = createEditor({
      namespace: 'TimeServiceNotepad',
      onError: (error) => console.error(error)
    });

    editor.setRootElement(editorElement);

    editor.registerUpdateListener(({ editorState }) => {
      editorState.read(() => {
        const root = $getRoot();
        const text = root.getTextContent();
      });
    });

    document.getElementById('close-notepad-btn').onclick = () => {
      window.close();
    };

    document.getElementById('save-notepad-btn').onclick = async () => {
      let textContent = "";
      editor.getEditorState().read(() => {
        textContent = $getRoot().getTextContent();
      });

      const result = await dialog.showSaveDialog({
        title: "Save Note",
        defaultPath: "",
        filters: [
          { name: 'Text Files', extensions: ['txt'] },
          { name: 'All Files', extensions: ['*'] }
        ]
      });

      if (!result.canceled && result.filePath) {
        fs.writeFile(result.filePath, textContent, (err) => {
          if (err) {
            console.error(`save failed`);
          } else {
            alert('File saved successfully!');
          }
        });
      }
    };
  </script>
</body>
</html>
